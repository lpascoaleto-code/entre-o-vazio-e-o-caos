<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre o Vazio e o Caos — Oficial</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
        header { padding: 50px 20px; text-align: center; border-bottom: 3px solid #6a00ff; background: #080808; }
        h1 { margin: 0; letter-spacing: 3px; text-transform: uppercase; }
        section { padding: 40px 20px; max-width: 1200px; margin: auto; }
        h2 { color: #6a00ff; border-left: 5px solid #6a00ff; padding-left: 15px; text-transform: uppercase; margin-top: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .sem-video { background: #1a1a1a; color: #ffcc00; padding: 40px 10px; border-radius: 8px; font-size: 0.8rem; border: 1px dashed #444; display: block; }
        .titulo-item { font-weight: bold; display: block; margin-top: 10px; color: #fff; font-size: 0.9rem; }
        video { width: 100%; border-radius: 8px; margin-bottom: 10px; display: block; }
        footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

<header>
    <h1>Entre o Vazio e o Caos</h1>
    <p>Portal Oficial — Trilogia, Antologia e Série</p>
</header>

<main id="portal">
    </main>

<footer>
    <p>© 2026 Entre o Vazio e o Caos</p>
</footer>

<script>
    const trilogia = [
        "Era Cinza – O início de tudo",
        "Setor 7 – O despertar da Impostora",
        "O Abrigo – A história do soldado Mais Velho"
    ];

    const feriados = [
        "Especial de Natal: Noel e a Felicidade Artificial",
        "Especial de Halloween: O despertar do Ódio Puro",
        "Especial de Páscoa: O renascimento das virtudes",
        "Especial de Festa Junina: A fogueira contra o silêncio",
        "Especial de Ano Novo: O medo do futuro",
        "Especial de Dia das Crianças: A pureza da infância",
        "Especial de Dia de Reis: Busca por luz",
        "Especial de Corpus Christi: A Presença Real do Bem"
    ];

    const portal = document.getElementById('portal');

    function criarSecao(titulo, lista, eTemporada = false) {
        const divSecao = document.createElement('section');
        divSecao.innerHTML = `<h2>${titulo}</h2><div class="grid"></div>`;
        portal.appendChild(divSecao);
        const grid = divSecao.querySelector('.grid');

        lista.forEach((nome, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="sem-video">Não tem vídeo ainda. <br>Aguarde a postagem.</span>
                <span class="titulo-item">${eTemporada ? 'Episódio ' + (i+1) : nome}</span>
            `;
            grid.appendChild(card);
        });
    }

    // Gerar tudo na ordem correta
    criarSecao("Trailers Oficiais", Array(7).fill("Trailer"));
    criarSecao("Trilogia de Filmes", trilogia);
    criarSecao("Spin-offs: Antologia dos Feriados", feriados);

    for(let t=1; t<=6; t++) {
        criarSecao(`Temporada ${t}`, Array(10).fill(""), true);
    }
</script>

</body>
</html>
